# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name cssi.pdpu.ac.in;
    return 301 https://$server_name$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cssi.pdpu.ac.in;

    # SSL
    ssl_certificate     /etc/nginx/ssl/pdpu_ac_in.25.26.crt;
    ssl_certificate_key /etc/nginx/ssl/pdpu_ac_in.25.26.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Limits
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout 600s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        'upgrade';

    # ── Metrics endpoint — block public access (Prometheus scrapes internally) ─
    location /api/metrics {
        deny all;
        return 403;
    }

    # ── Auth endpoint (rate limited) ─────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 delay=5;
        proxy_pass http://nextjs:3000;
    }

    # ── File upload endpoint (rate limited) ──────────────────────────────────
    location /api/student/upload-file {
        limit_req zone=upload burst=5;
        proxy_pass http://nextjs:3000;
    }

    # ── Media files (MinIO) ───────────────────────────────────────────────────
    # Browser-accessible media served directly from MinIO.
    # URL: https://cssi.pdpu.ac.in/media/cssi/<folder>/<file>
    location /media/ {
        proxy_pass         http://minio:9000/;
        proxy_set_header   Host minio:9000;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static media aggressively
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400, immutable";

        # Strip /media prefix before passing to MinIO
        rewrite ^/media/(.*) /$1 break;
    }

    # ── Grafana monitoring dashboard ─────────────────────────────────────────
    # No trailing slash — Grafana serves from /grafana/ sub-path (GF_SERVER_SERVE_FROM_SUB_PATH)
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js app (everything else) ────────────────────────────────────────
    location / {
        proxy_pass http://nextjs:3000;
    }
}
