# ── Local development nginx config (HTTP only, no SSL) ───────────────────────
# This file is mounted by docker-compose.override.yml, replacing cssi.conf.
# Production uses cssi.conf (HTTPS + SSL certs).

# resolver is already set in nginx.conf http block (127.0.0.11).
# set $var in proxy_pass defers DNS lookup to request time — no startup failure.
server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        'upgrade';

    # Block metrics from outside
    location /api/metrics {
        deny all;
        return 403;
    }

    # Media via MinIO (resolver + variable = lazy DNS, survives minio restarts)
    location /media/ {
        set $minio_upstream http://minio:9000;
        rewrite ^/media/(.*) /$1 break;
        proxy_pass $minio_upstream;
        proxy_set_header Host minio:9000;
    }

    # Grafana (lazy DNS so nginx starts even when grafana is still booting)
    # No trailing slash — Grafana serves from /grafana/ sub-path (GF_SERVER_SERVE_FROM_SUB_PATH)
    # so the full /grafana/... URI must be forwarded as-is, not stripped.
    location /grafana/ {
        set $grafana_upstream http://grafana:3000;
        proxy_pass $grafana_upstream;
    }

    # Auth rate limit
    location /api/auth/ {
        limit_req zone=auth burst=10 delay=5;
        set $nextjs_upstream http://nextjs:3000;
        proxy_pass $nextjs_upstream;
    }

    # Everything else → Next.js
    location / {
        set $nextjs_upstream http://nextjs:3000;
        proxy_pass $nextjs_upstream;
    }
}
