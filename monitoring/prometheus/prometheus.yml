global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: cssi-production

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers: []  # Grafana Alerting is used instead of Alertmanager

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Host metrics (CPU, memory, disk, network)
  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]

  # PostgreSQL metrics
  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  # Loki self-monitoring
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
